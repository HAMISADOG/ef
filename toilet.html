<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>the flooding of the toilets</title>
<style>
        :root {

            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --bg: #0f172a;
            --surface: #1e293b;
            --border: #334155;
            --radius: 12px;
            --radius-lg: 16px;
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.6), 0 4px 6px -4px rgb(0 0 0 / 0.6);
            --gradient-primary: linear-gradient(135deg, #9d9d9d0a 0%, #9d9d9d0a 100%);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
        }
        header {
            background: var(--gradient-primary);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow-lg);
        }
        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.25rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .links {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .links a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            transition: all 0.3s;
            cursor: pointer;
        }
        main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 3rem 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .title {
            font-size: 4rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
            margin: 0;
        }
        .announcements {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            width: 100%;
            max-width: 800px;
            box-shadow: var(--shadow-lg);
        }
        .announcements h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 0.5rem 0 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }
        .announcements i { color: var(--primary); }
        .announcements hr {
            border: 0;
            height: 1px;
            background-image: url(67.png);
            margin-bottom: 1.5rem;
        }
        .announcements p {
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.7;
            margin: 0;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="information.html" class="title">the flooding of the toilets</a>
            <nav class="links">
                <a id="launchBtn">stuff</a>
                <a href="">under construction</a>
                <a href="">BANANA</a>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <img src="67.png" alt=" 67" style="margin-right: 24px; height: 180px; width: 699px;" class="67">
        </section>

        <section class="announcements">
            <a href = "main.html"><h1 class = "title"><i class="title"></i>BRUH.github.io</h1><a>
            <hr>
            <p>welcome to my website!!!</p>
        </section>
    </main>
    <script>
        //change var page to go to the desiered page
        var varPage="main.html"

        async function openInAboutBlank() {
            try {
                launchBtn.classList.add('loading');

                const response = await fetch('https://raw.githubusercontent.com/HAMISADOG/ef/refs/heads/main/'+varPage);

                if (!response.ok) throw new Error(`${response.status}`);

                const html = await response.text();

                const newWindow = window.open('about:blank', '_blank');

                if (!newWindow) {
                    alert('');
                    launchBtn.classList.remove('loading');
                    return;
                }

                newWindow.document.open();
                newWindow.document.write(html);
                newWindow.document.close();

                setTimeout(() => {
                    launchBtn.classList.remove('loading');
                }, 500);

            } catch (error) {
                console.error('Error:', error);
                alert('Failed to load the site. Please try again.');
                launchBtn.classList.remove('loading');
            }
        }

        launchBtn.addEventListener('click', openInAboutBlank);
    </script>
</body>
</html>
